name: Automated Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'screenshots/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Bump Version
        id: bump_version
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Increment patch version in package.json
          npm version patch --no-git-tag-version
          
          # Get the new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Sync version with manifests
          # Using node to safely update JSON files
          node -e "
            const fs = require('fs');
            ['manifest.chrome.json', 'manifest.firefox.json'].forEach(file => {
              const manifest = JSON.parse(fs.readFileSync(file, 'utf8'));
              manifest.version = '$NEW_VERSION';
              fs.writeFileSync(file, JSON.stringify(manifest, null, 2) + '\n');
            });
          "

          # Commit and push version bump
          git add package.json manifest.chrome.json manifest.firefox.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

      - name: Build Chrome Extension
        run: npm run build:chrome

      - name: Build Firefox Extension
        run: npm run build:firefox

      - name: Package Extensions
        run: |
          mkdir -p artifacts
          cd dist/chrome && zip -r ../../artifacts/yt-blur-chrome-${{ env.NEW_VERSION }}.zip . && cd ../..
          cd dist/firefox && zip -r ../../artifacts/yt-blur-firefox-${{ env.NEW_VERSION }}.zip . && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: Release v${{ env.NEW_VERSION }}
          draft: false
          prerelease: false
          files: |
            artifacts/yt-blur-chrome-${{ env.NEW_VERSION }}.zip
            artifacts/yt-blur-firefox-${{ env.NEW_VERSION }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
