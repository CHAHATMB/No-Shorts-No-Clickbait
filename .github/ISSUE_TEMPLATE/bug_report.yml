name: Bug Report
description: Create a report to help us improve.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you did!
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser were you using?
      placeholder: e.g. Chrome, Firefox, Edge
    validations:
      required: true
